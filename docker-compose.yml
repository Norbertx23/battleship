version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: battleship_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: battleship_db
      TZ: Europe/Warsaw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: battleship_backend
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://admin:secretpassword@db:5432/battleship_db
    ports:
      - "8001:8000"

  frontend:
    build: ./frontend
    container_name: battleship_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data: