server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Obsługa gry w trybie bezpośrednim na Macu bez zewnętrznego Nginxa
    location /battleship_net/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }
}
