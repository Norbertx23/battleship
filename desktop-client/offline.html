<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Błąd połączenia - Battleship</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.4);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            max-width: 500px;
        }

        h1 {
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1em;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        button {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1em;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Brak połączenia z serwerem</h1>
        <p>Nie można nawiązać połączenia z serwerem gry (192.168.1.200 / ubuntu-server).</p>
        <p>Upewnij się, że jesteś podłączony do sieci domowej (LAN) lub VPN, a serwer działa poprawnie.</p>
        <button onclick="retry()">Spróbuj ponownie</button>
    </div>

    <script>
        function retry() {
            window.location.href = 'http://192.168.1.200/battleship_net/';
        }
    </script>
</body>

</html>
